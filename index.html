<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <!-- Favicon -->
        <link
            rel="icon"
            type="image/png"
            href="./assets/favicon/favicon-96x96.png"
            sizes="96x96"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="./assets/favicon/favicon.svg"
        />
        <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="./assets/favicon/apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="Babble" />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
            rel="stylesheet"
        />

        <!-- Main CSS -->
        <link rel="stylesheet" href="./assets/css/main.css" />
        <link rel="stylesheet" href="./assets/css/main.css.map" />

        <!-- Animations CSS -->
        <link rel="stylesheet" href="./assets/animation/aos.css" />
    </head>
    <body style="height: 10000px">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <a href="#">
                        <img
                            src="./assets/img/logo.svg"
                            alt="Babble"
                            class="header__logo"
                        />
                    </a>

                    <nav class=".nav">
                        <ul class="navbar">
                            <li class="navbar-item">
                                <a href="#!" class="navbar__link p2"
                                    >Episodes</a
                                >
                            </li>
                            <li class="navbar-item">
                                <a href="#!" class="navbar__link p2"
                                    >Trending</a
                                >
                            </li>
                            <li class="navbar-item">
                                <a href="#!" class="navbar__link p2"
                                    >Category</a
                                >
                            </li>
                            <li class="navbar-item">
                                <a href="#!" class="navbar__link p2">Blog</a>
                            </li>
                        </ul>
                    </nav>

                    <div class="header__actions">
                        <a href="#!" class="header__log-in">Log in</a>
                        <button class="btn btn2 btn-dark header__sign-up">
                            Sign up
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <section class="hero">
                <div class="container">
                    <div class="row row-cols-lg-2 row-cols-1 hero__inner">
                        <div class="col-lg-6 col-12">
                            <div class="hero__media">
                                <figure
                                    class="hero__img-wrapper row row-cols-2"
                                >
                                    <div class="col-6">
                                        <div class="hero__bg-left">
                                            <img
                                                src="./assets/img/hero-img-1.jpg"
                                                alt="A new era of podcasting for you"
                                                class="hero__img-left"
                                            />

                                            <div class="hero__music">
                                                <button
                                                    class="hero__music-play"
                                                >
                                                    <img
                                                        src="./assets/icon/play.svg"
                                                        alt="play"
                                                        class="hero__music-icon"
                                                    />
                                                </button>
                                                <img
                                                    src="./assets/icon/music-track.svg"
                                                    alt="music track"
                                                    class="hero__music-track"
                                                />
                                            </div>
                                        </div>

                                        <div class="hero__listener">
                                            <span class="hero__listener-title"
                                                >Podcast listener</span
                                            >
                                            <div class="hero__listener-row">
                                                <div class="hero__listener-bg">
                                                    <img
                                                        src="./assets/img/hero-listener-1.jpg"
                                                        alt="listener 1"
                                                        class="hero__listener-avt"
                                                    />
                                                </div>
                                                <div class="hero__listener-bg">
                                                    <img
                                                        src="./assets/img/hero-listener-2.jpg"
                                                        alt="listener 2"
                                                        class="hero__listener-avt"
                                                    />
                                                </div>
                                                <div class="hero__listener-bg">
                                                    <img
                                                        src="./assets/img/hero-listener-3.jpg"
                                                        alt="listener 3"
                                                        class="hero__listener-avt"
                                                    />
                                                </div>
                                                <div class="hero__listener-bg">
                                                    <span
                                                        class="hero__listener-more"
                                                        >+50K</span
                                                    >
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-6 hero__meida-right">
                                        <img
                                            src="./assets/icon/hero-decor.svg"
                                            alt=""
                                            class="hero__decor hero__decor--right"
                                        />
                                        <img
                                            src="./assets/icon/hero-decor.svg"
                                            alt=""
                                            class="hero__decor hero__decor--left"
                                        />

                                        <div class="hero__bubble">
                                            <span class="hero__bubble-title"
                                                >500+</span
                                            >
                                            <span class="hero__bubble-desc"
                                                >Podcasts</span
                                            >
                                        </div>

                                        <div class="hero__brand">
                                            <img
                                                src="./assets/img/spotify.svg"
                                                alt="Spotify"
                                                class="hero__brand-logo"
                                            />
                                            <img
                                                src="./assets/img/google-podcast.svg"
                                                alt="Google Podcast"
                                                class="hero__brand-logo"
                                            />
                                            <img
                                                src="./assets/img/apple-podcast.svg"
                                                alt="Apple Podcast"
                                                class="hero__brand-logo"
                                            />
                                        </div>

                                        <div class="hero__bg-right">
                                            <img
                                                src="./assets/img/hero-img-2.jpg"
                                                alt="Sarah Taylor | Song podcaster"
                                                class="hero__img-right"
                                            />

                                            <div class="hero__label">
                                                <span class="hero__label-name"
                                                    >Sarah Taylor</span
                                                >
                                                <span class="hero__label-job"
                                                    >Song podcaster</span
                                                >
                                            </div>
                                        </div>
                                    </div>
                                </figure>
                            </div>
                        </div>
                        <div class="col-lg-5 col-12 offset-lg-1 hero__content">
                            <h1 class="hero__content-heading">
                                A new era of podcasting for you
                            </h1>
                            <p class="hero__content-desc p1">
                                Rebuilt for simplicity and speed, so you can
                                spend more time discovering and listening to
                                great podcasts.
                            </p>
                            <div class="hero__actions">
                                <a href="#!" class="btn btn1">Get Started</a>
                                <a href="#!">
                                    <div class="hero__cta">
                                        <span class="hero__more"
                                            >Listen now</span
                                        >
                                        <div class="hero__play-wrapper">
                                            <img
                                                src="./assets/icon/play-white.svg"
                                                alt="listen now"
                                                class="hero__play--dark"
                                            />
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
